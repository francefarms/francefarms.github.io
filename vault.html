<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Vault | Françe Farms</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --green: #00e54a; --bg: #080f08; --border: #1e3a1e; }
        body { background: var(--bg); color: #c8e6c8; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; }
        nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        nav a { color: #666; text-decoration: none; font-family: 'Share Tech Mono'; font-size: 0.8rem; }
        nav a:hover, nav a.active { color: var(--green); }
        h1 { font-family: 'Share Tech Mono'; color: #fff; text-transform: uppercase; letter-spacing: 3px; font-style: italic; }
        h1 em { color: var(--green); font-style: normal; }
        table { width: 100%; border-collapse: collapse; background: #0d180d; border: 1px solid var(--border); }
        th { background: rgba(0, 229, 74, 0.1); color: var(--green); font-family: 'Share Tech Mono'; text-align: left; padding: 12px; font-size: 0.75rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .hash { font-family: 'Share Tech Mono'; font-size: 0.7rem; color: #4a7a4a; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">DASHBOARD</a>
    <a href="bio-estate.html">SCANNER</a>
    <a href="vault.html" class="active">VAULT</a>
</nav>

<h1>THE <em>VAULT</em></h1>

<table>
    <thead>
        <tr>
            <th>DATE</th>
            <th>NODE</th>
            <th>BATCH</th>
            <th>INTEGRITY HASH (SHA-256)</th>
        </tr>
    </thead>
    <tbody id="vault-body">
        <tr><td colspan="4">Synchronizing with node...</td></tr>
    </tbody>
</table>

<script>
    async function loadVault() {
        try {
            const response = await fetch('https://api.francefarms.net/api/vault');
            const data = await response.json();
            const tbody = document.getElementById('vault-body');
            tbody.innerHTML = '';
            data.forEach(row => {
                const date = new Date(row.created_at).toLocaleString();
                tbody.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td style="color:var(--green)">${row.node_id}</td>
                        <td>${row.batch}</td>
                        <td class="hash">${row.sha256}</td>
                    </tr>
                `;
            });
        } catch (err) {
            document.getElementById('vault-body').innerHTML = '<tr><td colspan="4" style="color:red">VAULT CONNECTION FAILED</td></tr>';
        }
    }
    loadVault();
</script>
</body>
</html>
