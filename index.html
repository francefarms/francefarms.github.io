<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="meta-title">Françe Farms — Secure Your Harvest</title>
<meta name="description" content="Françe Farms Scanner: GPS-locked, SHA-256 cryptographic provenance for your produce. Prove freshness. Protect profits.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  /* --- Light Palette --- */
  --green-deep:   #0f3d22;
  --green-main:   #1e6b3c;
  --green-mid:    #2d8a52;
  --green-light:  #4aad6e;
  --gold:         #c8960c;
  --gold-light:   #f5c84a;
  --cream:        #fdf8f0;
  --cream-dark:   #f0e9dc;
  --text-dark:    #1a2a1e;
  --text-mid:     #3d5c45;
  --text-light:   #6b8c74;
  --white:        #ffffff;
  --radius:       12px;
  --shadow:       0 8px 40px rgba(15,61,34,0.13);
  --nav-bg:       rgba(253,248,240,0.95);
  --border-color: rgba(30,107,60,0.1);
  --card-bg:      #ffffff;
}

/* --- Dark Theme Palette Overrides --- */
[data-theme="dark"] {
  --green-deep:   #0a2314;
  --green-main:   #26854c;
  --green-mid:    #349e5f;
  --green-light:  #5cc482;
  --gold:         #e0aa1b;
  --gold-light:   #f7d672;
  --cream:        #121a15;
  --cream-dark:   #19241d;
  --text-dark:    #f3f7f4;
  --text-mid:     #c2d1c6;
  --text-light:   #92aba3;
  --white:        #1a261f;
  --shadow:       0 8px 40px rgba(0,0,0,0.4);
  --nav-bg:       rgba(18,26,21,0.95);
  --border-color: rgba(74,173,110,0.2);
  --card-bg:      #1a261f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
}

/* ─── NAV ─── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--nav-bg);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(20px,5vw,60px);
  height: 68px;
  transition: background 0.3s ease, border-color 0.3s ease;
}

.nav-logo {
  display: flex; align-items: center; gap: 12px;
  text-decoration: none;
}
.nav-logo img {
  width: 42px; height: 42px; border-radius: 10px;
  object-fit: cover;
}
.nav-logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700;
  color: var(--green-light);
  letter-spacing: -0.3px;
}

.nav-controls {
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 8px;
  list-style: none;
}
.nav-links a {
  text-decoration: none;
  font-size: 14px; font-weight: 500;
  color: var(--text-mid);
  padding: 8px 16px;
  border-radius: 8px;
  transition: all 0.2s;
}
.nav-links a:hover, .nav-links a.active {
  background: var(--green-main);
  color: #ffffff;
}
.nav-cta {
  background: var(--green-main) !important;
  color: #ffffff !important;
  font-weight: 600 !important;
}

/* ─── DARK MODE & LANGUAGE CONTROLS ─── */
.theme-toggle-btn {
  background: transparent;
  border: 1px solid var(--border-color);
  color: var(--text-dark);
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s ease;
}
.theme-toggle-btn:hover {
  background: rgba(30,107,60,0.1);
}

.lang-selector {
  background: var(--cream);
  border: 1px solid var(--border-color);
  color: var(--text-dark);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s ease;
}

/* Mobile nav toggle */
.nav-hamburger {
  display: none;
  flex-direction: column; gap: 5px;
  cursor: pointer; padding: 4px;
}
.nav-hamburger span {
  display: block; width: 24px; height: 2px;
  background: var(--green-main); border-radius: 2px;
  transition: all 0.3s;
}

/* ─── PAGES ─── */
.page { display: none; padding-top: 68px; min-height: 100vh; }
.page.active { display: block; }

/* ─── HOME PAGE ─── */
.hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: center;
  padding: clamp(48px,8vh,100px) clamp(24px,6vw,80px);
  max-width: 1200px;
  margin: 0 auto;
}

.hero-text { max-width: 520px; }

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(30,107,60,0.08);
  border: 1px solid rgba(30,107,60,0.2);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 12px; font-weight: 600;
  color: var(--green-light);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 20px;
}
.eyebrow-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green-light);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.6;transform:scale(1.4);} }

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 5vw, 62px);
  font-weight: 900;
  line-height: 1.05;
  color: var(--text-dark);
  letter-spacing: -1px;
  margin-bottom: 20px;
}
.hero-title em {
  font-style: italic;
  color: var(--green-light);
}

.hero-body {
  font-size: clamp(15px, 1.6vw, 17px);
  line-height: 1.7;
  color: var(--text-mid);
  margin-bottom: 32px;
}

.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--green-main);
  color: #ffffff;
  padding: 14px 28px;
  border-radius: var(--radius);
  font-size: 15px; font-weight: 600;
  text-decoration: none;
  border: none; cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(30,107,60,0.3);
}
.btn-primary:hover { background: var(--green-deep); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(30,107,60,0.35); }

.btn-secondary {
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent;
  color: var(--text-dark);
  padding: 14px 28px;
  border-radius: var(--radius);
  font-size: 15px; font-weight: 600;
  text-decoration: none;
  border: 2px solid var(--border-color);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--green-main); background: rgba(30,107,60,0.05); }

.hero-stats {
  display: flex; gap: 28px; margin-top: 36px;
  padding-top: 28px;
  border-top: 1px solid var(--border-color);
}
.stat-item { display: flex; flex-direction: column; gap: 2px; }
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 700;
  color: var(--green-light);
}
.stat-label { font-size: 12px; color: var(--text-light); font-weight: 500; }

/* ─── VIDEO PANEL ─── */
.hero-video-wrap { position: relative; }
.video-card {
  background: #0f3d22;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(15,61,34,0.25);
  position: relative;
}
#stage { width: 100%; aspect-ratio: 16/9; position: relative; overflow: hidden; }
.scene { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity 0.7s ease; }
.scene.active { opacity: 1; pointer-events: all; }

#s0 { background: linear-gradient(160deg, #155230 0%, #1e6b3c 50%, #2d8a52 100%); }
#s1 { background: #f5f0e8; }
#s2 { background: #edf4ff; }
#s3 { background: #fdf8ee; }
#s4 { background: linear-gradient(160deg, #0d3d24 0%, #1e6b3c 60%, #2d8a52 100%); }

.caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(10,35,20,0.88);
  color: #fff; font-size: clamp(11px,1.5vw,14px); font-weight: 600;
  padding: 10px 16px; text-align: center; line-height: 1.4;
  min-height: 42px; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}

/* Scene elements styling rules preserve animations functionality */
.title-scene { display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px; }
.title-leaf { width:clamp(42px,7vw,70px);height:clamp(42px,7vw,70px);margin-bottom:12px;animation:floatLeaf 3s ease-in-out infinite; }
@keyframes floatLeaf { 0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-9px) rotate(5deg);} }
.title-main { font-family:'Playfair Display',serif;font-size:clamp(20px,4vw,38px);font-weight:900;color:#fff;line-height:1.1; }
.title-sub { font-size:clamp(9px,1.5vw,13px);color:rgba(255,255,255,0.7);margin-top:6px;letter-spacing:2px;text-transform:uppercase; }
.title-badge { margin-top:12px;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.35);border-radius:20px;padding:5px 16px;font-size:clamp(10px,1.5vw,13px);color:#fff;font-weight:700; }

.sky-text { position:absolute;top:14px;left:0;right:0;text-align:center;font-size:clamp(10px,2vw,15px);font-weight:800;color:#5a3e1b;opacity:0.8;padding:0 12px; }
.market-ground { position:absolute;bottom:50px;left:0;right:0;height:3px;background:#c8a86b;opacity:0.4; }
.market-scene { display:flex;align-items:flex-end;justify-content:center;height:100%;padding-bottom:58px;gap:8px; }
.stall-roof { width:clamp(80px,13vw,120px);height:clamp(24px,3.5vw,36px);background:#e85d04;border-radius:4px 4px 0 0;position:relative; }
.stall-roof::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:8px;background:#c94d00;border-radius:0 0 4px 4px;}
.stall-body { width:clamp(80px,13vw,120px);height:clamp(50px,7vw,72px);background:#f4e5c3;border:2px solid #c8a86b;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:3px;padding:5px; }
.mango-icon { font-size:clamp(14px,2.2vw,20px); }
.stall-sign { background:#1e6b3c;color:#fff;font-size:clamp(7px,1vw,10px);font-weight:700;padding:2px 8px;border-radius:4px;margin-top:2px;letter-spacing:0.5px; }
.buyer-wrap { position:relative;margin-left:clamp(10px,2vw,28px);margin-bottom:4px; }
.buyer-head { width:clamp(24px,4vw,38px);height:clamp(24px,4vw,38px);background:#f5c87a;border-radius:50%;border:2.5px solid #d4a055;position:relative; }
.buyer-body { width:clamp(32px,5vw,46px);height:clamp(36px,5.5vw,52px);background:#3a86d4;border-radius:6px 6px 0 0; }
.buyer-legs { display:flex;gap:3px; }
.buyer-leg { width:clamp(12px,2vw,18px);height:clamp(16px,2.5vw,22px);background:#1a4f8a;border-radius:0 0 4px 4px; }
.question-bubble { background:#fff;border:2px solid #1e6b3c;border-radius:12px 12px 12px 0;padding:3px 8px;font-size:clamp(8px,1.2vw,11px);font-weight:700;color:#1e6b3c;position:absolute;top:-8px;right:-12px;white-space:nowrap;animation:popIn 0.4s ease; }
@keyframes popIn{0%{transform:scale(0);opacity:0;}80%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}

.phone-scene{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;padding-bottom:50px;}
.phone-frame{width:clamp(48px,7vw,72px);height:clamp(82px,12vw,124px);background:#1a1a2e;border-radius:10px;border:2.5px solid #444;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,0.2);}
.phone-screen{width:calc(100% - 6px);height:calc(100% - 6px);background:#edf4ff;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
.phone-camera-anim{width:38px;height:38px;border:2px solid #1e6b3c;border-radius:4px;position:relative;display:flex;align-items:center;justify-content:center;font-size:18px;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:#1e6b3c;top:0;animation:scanDown 1.2s ease-in-out infinite;}
@keyframes scanDown{0%{top:0;}50%{top:calc(100% - 2px);}100%{top:0;}}
.phone-label{font-size:7px;font-weight:700;color:#1e6b3c;letter-spacing:0.5px;}
.gps-badge{display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #1e6b3c;border-radius:20px;padding:4px 12px;font-size:clamp(9px,1.3vw,12px);font-weight:700;color:#1e6b3c;animation:slideIn 0.5s ease;}
.gps-dot{width:7px;height:7px;background:#e85d04;border-radius:50%;animation:pulse 1s ease-in-out infinite;}
@keyframes slideIn{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.hash-display{font-size:clamp(8px,1.1vw,10px);font-family:monospace;color:#155230;background:#e1f0e8;border-radius:5px;padding:3px 10px;}

.qr-scene{display:flex;align-items:center;justify-content:center;height:100%;gap:clamp(8px,2.5vw,24px);flex-wrap:wrap;padding:12px 12px 60px;}
.crate{width:clamp(60px,10vw,90px);height:clamp(32px,5.5vw,48px);background:#c8960c;border:2px solid #8a6600;border-radius:4px;display:flex;align-items:center;justify-content:center;position:relative;}
.crate::before,.crate::after{content:'';position:absolute;top:50%;transform:translateY(-50%);width:2px;height:80%;background:#8a6600;}
.crate::before{left:18px;}.crate::after{right:18px;}
.qr-sticker{width:28px;height:28px;background:#fff;border:1px solid #555;border-radius:2px;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:1px;padding:2px;position:absolute;right:-15px;top:50%;transform:translateY(-50%);box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.qr-cell{background:#1a1a1a;border-radius:1px;}.qr-empty{background:#fff;}
.check-badge{background:#1e6b3c;color:#fff;border-radius:16px;padding:5px 14px;font-size:clamp(9px,1.3vw,12px);font-weight:700;animation:popIn 0.4s ease;text-align:center;}
.arrow-anim{font-size:clamp(16px,2.5vw,24px);animation:bounceRight 0.8s ease-in-out infinite;color:#1e6b3c;}
@keyframes bounceRight{0%,100%{transform:translateX(0);}50%{transform:translateX(5px);}}

.final-scene{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px;}
.final-logo-box{width:clamp(60px,9vw,90px);height:clamp(60px,9vw,90px);background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.3);border-radius:16px;display:flex;align-items:center;justify-content:center;animation:logoReveal 0.7s ease;margin-bottom:10px;}
@keyframes logoReveal{from{transform:scale(0.6) rotate(-10deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.final-tagline{font-family:'Playfair Display',serif;font-size:clamp(18px,3.5vw,32px);font-weight:900;color:#fff;line-height:1.1;}
.final-sub{font-size:clamp(11px,2vw,16px);color:rgba(255,255,255,0.8);margin-top:6px;font-weight:600;line-height:1.4;}
.badge-row{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.pill{background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);border-radius:16px;padding:4px 12px;font-size:clamp(8px,1.1vw,11px);color:#fff;font-weight:700;}
.stars-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.star{position:absolute;background:rgba(255,255,255,0.5);border-radius:50%;animation:twinkle 2s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1);}50%{opacity:0.9;transform:scale(1.6);}}

.video-controls { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #0a2314; }
.play-btn {
  background: var(--green-mid); color: #fff;
  border: none; border-radius: 8px;
  padding: 7px 16px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  flex-shrink: 0; transition: background 0.2s;
}
.play-btn:hover { background: var(--green-light); }
.progress-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.15); border-radius: 3px; cursor: pointer; }
.progress-bar { height: 100%; width: 0%; background: var(--green-light); border-radius: 3px; transition: width 0.1s linear; }
.time-label { font-size: 11px; color: rgba(255,255,255,0.5); font-family: monospace; min-width: 44px; }

.trust-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; padding: 0 14px 14px; justify-content: center; }
.trust-chip {
  display: flex; align-items: center; gap: 5px;
  background: rgba(30,107,60,0.08);
  border: 1px solid var(--border-color);
  border-radius: 8px; padding: 5px 10px;
  font-size: 11px; font-weight: 600; color: var(--green-light);
}

/* ─── HOW IT WORKS STRIP ─── */
.how-strip { background: #0a2314; padding: clamp(48px,6vh,80px) clamp(24px,6vw,80px); }
.how-strip h2 { font-family: 'Playfair Display', serif; font-size: clamp(26px,3.5vw,40px); color: #fff; text-align: center; margin-bottom: 40px; }
.steps-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 24px; max-width: 900px; margin: 0 auto; }
.step-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px 22px; text-align: center; }
.step-icon { font-size: 32px; margin-bottom: 12px; }
.step-num { display: inline-block; width: 24px; height: 24px; line-height: 24px; background: var(--green-mid); color: #fff; border-radius: 50%; font-size: 11px; font-weight: 800; margin-bottom: 8px; }
.step-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.step-body { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.6; }

/* ─── SCANNER PAGE ─── */
.scanner-hero { background: linear-gradient(135deg, #0a2314 0%, var(--green-main) 100%); padding: clamp(60px,8vh,100px) clamp(24px,6vw,80px) clamp(48px,6vh,80px); text-align: center; }
.scanner-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(32px,5vw,54px); color: #fff; margin-bottom: 14px; }
.scanner-hero p { font-size: clamp(14px,1.8vw,18px); color: rgba(255,255,255,0.75); max-width: 560px; margin: 0 auto; line-height: 1.7; }
.scanner-content { max-width: 900px; margin: 0 auto; padding: clamp(40px,6vh,80px) clamp(24px,5vw,60px); display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
.scanner-steps { display: flex; flex-direction: column; gap: 20px; }
.scanner-step { background: var(--card-bg); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: transform 0.2s, background 0.3s; }
.scanner-step:hover { transform: translateY(-2px); }
.step-badge { width: 40px; height: 40px; flex-shrink: 0; background: var(--green-main); color: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.step-info h3 { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
.step-info p { font-size: 13px; color: var(--text-light); line-height: 1.6; }
.scanner-tech { background: #0a2314; border-radius: 20px; padding: 32px; color: #fff; position: sticky; top: 88px; }
.scanner-tech h3 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 20px; color: #fff; }
.tech-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
.tech-item:last-child { border-bottom: none; }
.tech-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
.tech-label { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.9); margin-bottom: 2px; }
.tech-desc { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.5; }
.hash-demo { margin-top: 20px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 14px; font-family: monospace; font-size: 11px; color: #4aad6e; line-height: 1.8; border: 1px solid rgba(74,173,110,0.2); }

/* ─── CONTACT PAGE ─── */
.contact-hero { background: var(--cream-dark); padding: clamp(60px,8vh,100px) clamp(24px,6vw,80px) clamp(48px,6vh,80px); text-align: center; border-bottom: 1px solid var(--border-color); transition: background 0.3s; }
.contact-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(32px,5vw,54px); color: var(--text-dark); margin-bottom: 14px; }
.contact-hero p { font-size: clamp(14px,1.8vw,17px); color: var(--text-mid); max-width: 500px; margin: 0 auto; line-height: 1.7; }
.contact-content { max-width: 860px; margin: 0 auto; padding: clamp(40px,6vh,80px) clamp(24px,5vw,60px); display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
.contact-info { display: flex; flex-direction: column; gap: 20px; }
.contact-card { display: flex; gap: 16px; align-items: flex-start; background: var(--card-bg); border-radius: 14px; padding: 22px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: background 0.3s; }
.contact-icon { width: 44px; height: 44px; flex-shrink: 0; background: rgba(30,107,60,0.08); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--green-light); }
.contact-card h3 { font-size: 14px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
.contact-card p, .contact-card a { font-size: 13px; color: var(--text-light); line-height: 1.6; text-decoration: none; }
.contact-card a:hover { color: var(--green-main); }
.contact-form { background: var(--card-bg); border-radius: 20px; padding: 32px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: background 0.3s; }
.contact-form h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text-dark); margin-bottom: 24px; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.form-group label { font-size: 13px; font-weight: 600; color: var(--text-mid); }
.form-group input, .form-group textarea, .form-group select { padding: 11px 14px; border: 1.5px solid var(--border-color); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-dark); background: var(--cream); transition: border-color 0.2s, background 0.3s; outline: none; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--green-main); background: var(--card-bg); }
.form-group textarea { resize: vertical; min-height: 100px; }
.form-submit { width: 100%; padding: 13px; background: var(--green-main); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.form-submit:hover { background: var(--green-deep); }
