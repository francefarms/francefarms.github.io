<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Françe Farms — Bio-Estate Ledger Tracker</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --neon-green: #00ff66;
      --dark-bg: #0a0f0d;
      --panel-bg: #121b16;
      --border-color: #1f3328;
      --text-main: #e0e6e3;
      --green-deep: #0f3d22;
      --green-main: #1e6b3c;
      --green-mid: #2d8a52;
      --green-light: #4aad6e;
      --cream: #fdf8f0;
      --text-dark: #1a2a1e;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); margin: 0; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(253,248,240,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 68px; }
    .scanner-page-layout { max-width: 800px; margin: 100px auto; padding: 0 20px; }
    .terminal-box { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 20px 0; }
    input { width: 100%; padding: 12px; background: #0a0f0d; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; }
    .action-btn { background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); padding: 14px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold; }
    .terminal { background: #050706; border: 1px solid var(--border-color); padding: 15px; height: 180px; overflow-y: auto; margin-top: 25px; color: #fff; font-family: monospace; font-size: 0.85rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#" style="text-decoration:none; color:var(--text-dark); font-weight:700;">Françe Farms</a>
</nav>

<div id="scanner" class="page">
  <div class="scanner-page-layout">
    <div class="terminal-box">
      <h2>Ledger Engine</h2>
      <div class="form-row">
        <div><label>Node ID</label><input type="text" id="node-id" value="GRANDE_01"></div>
        <div><label>Batch Reference</label><input type="text" id="batch" value="COCOA-2026-B1"></div>
      </div>
      <input type="file" id="file-input" accept="image/*">
      <button class="action-btn" id="execute-btn">Execute Ledger Submission</button>
      
      <div id="hash-wrapper" class="hidden">
        <p style="margin-top:15px; color:var(--neon-green);">Immutable Signature:</p>
        <div id="hash-output" style="background:#050706; padding:10px; color:#00ff66; word-break:break-all;"></div>
      </div>
      <div class="terminal" id="terminal-console"></div>
    </div>
  </div>
</div>

<script>
  // PERMANENT PRODUCTION URL
  const API_URL = "https://api.francefarms.net/api/scans";
  const executeBtn = document.getElementById('execute-btn');
  const fileInput = document.getElementById('file-input');

  function consoleLog(msg) {
    const term = document.getElementById('terminal-console');
    term.innerHTML += `<div>> ${msg}</div>`;
    term.scrollTop = term.scrollHeight;
  }

  async function generateSHA256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  executeBtn.addEventListener('click', () => {
    executeBtn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      pos => sendDataToBackend(pos.coords.latitude, pos.coords.longitude),
      () => sendDataToBackend("10.650000", "-61.510000")
    );
  });

  async function sendDataToBackend(lat, lon) {
    const nodeId = document.getElementById('node-id').value.trim();
    const batchRef = document.getElementById('batch').value.trim();
    const isoTimestamp = new Date().toISOString();
    const clientGeneratedHash = await generateSHA256(`${nodeId}-${batchRef}-${lat}-${lon}-${isoTimestamp}`);

    document.getElementById('hash-wrapper').classList.remove('hidden');
    document.getElementById('hash-output').textContent = clientGeneratedHash;

    const formData = new FormData();
    formData.append('node_id', nodeId);
    formData.append('batch_ref', batchRef);
    formData.append('hash', clientGeneratedHash);
    formData.append('payload_hash', clientGeneratedHash);
    formData.append('latitude', lat);
    formData.append('longitude', lon);
    formData.append('timestamp', isoTimestamp);
    formData.append('event_type', `AUDIT_LOG:${batchRef}`);
    
    if (fileInput.files[0]) formData.append('image', fileInput.files[0]);

    try {
      consoleLog("Transmitting to Ledger...");
      const res = await fetch(API_URL, { method: 'POST', body: formData });
      if (res.ok) {
        consoleLog("SUCCESS: Record committed to ledger.");
      } else {
        const err = await res.text();
        consoleLog(`SERVER REJECTION: ${err}`);
      }
    } catch (err) {
      consoleLog("NETWORK ERROR: Check if tunnel and node server are running.");
    }
    executeBtn.disabled = false;
  }
</script>
</body>
</html>
