/* ─── THEME CONFIGURATION ─── */
:root {
  --green-deep:    #0f3d22;
  --green-main:    #1e6b3c;
  --green-mid:     #2d8a52;
  --green-light:   #4aad6e;
  --gold:          #c8960c;
  --gold-light:    #f5c84a;
  --cream:         #fdf8f0;
  --cream-dark:    #f0e9dc;
  --text-dark:     #1a2a1e;
  --text-mid:      #3d5c45;
  --text-light:    #6b8c74;
  --white:         #ffffff;
  --radius:        12px;
  --shadow:        0 8px 40px rgba(15,61,34,0.13);
  --nav-bg:        rgba(253,248,240,0.95);
  --card-bg:       #ffffff;
  --border-color:  rgba(30,107,60,0.1);
  --error-red:     #ff4444;
}

body.dark-theme {
  --green-deep:    #082213;
  --green-main:    #4aad6e;
  --green-mid:     #2d8a52;
  --green-light:   #6bca8c;
  --gold:          #f5c84a;
  --gold-light:    #fbe39d;
  --cream:         #121c15;
  --cream-dark:    #1a261f;
  --text-dark:     #fdf8f0;
  --text-mid:      #b3cfba;
  --text-light:    #8cae94;
  --white:         #1a261f;
  --shadow:        0 8px 40px rgba(0,0,0,0.5);
  --nav-bg:        rgba(12,28,21,0.95);
  --card-bg:       #1a261f;
  --border-color:  rgba(74,173,110,0.2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(74,173,110,0.008) 2px, rgba(74,173,110,0.008) 4px);
  pointer-events: none; z-index: 9999;
}

/* ─── NAVIGATION MODULE ─── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--nav-bg);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(20px,5vw,60px);
  height: 68px;
  transition: background 0.3s ease, border 0.3s ease;
}
.nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.nav-logo-text { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--text-dark); letter-spacing: -0.3px; }
.logo-leaf { width: 24px; height: 24px; fill: var(--green-main); transition: fill 0.3s; }
.nav-right-container { display: flex; align-items: center; gap: 20px; }
.nav-links { display: flex; align-items: center; gap: 8px; list-style: none; }
.nav-links a { text-decoration: none; font-size: 14px; font-weight: 500; color: var(--text-mid); padding: 8px 16px; border-radius: 8px; transition: all 0.2s; }
.nav-links a:hover, .nav-links a.active { background: var(--green-main); color: #fff; }
.theme-toggle-btn { background: none; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(30,107,60,0.08); transition: background 0.3s ease; }
