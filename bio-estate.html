<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Françe Farms | Sovereign Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #4CAF50; --bg: #050505; --card: #111; --text-main: #e0e0e0; --accent: #00ff41; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 15px; }
        .app-container { max-width: 480px; margin: 0 auto; background: var(--card); border: 1px solid #222; border-radius: 24px; overflow: hidden; position: relative; }
        .app-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid #222; }
        .subtitle { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        
        /* The "Active Link" Badge */
        #active-link-banner { display: none; background: #1b331b; color: var(--accent); padding: 12px; font-size: 0.65rem; border-bottom: 1px solid var(--accent); text-align: center; font-family: monospace; }

        .step-box { padding: 20px; border-bottom: 1px solid #222; }
        label { font-size: 0.7rem; color: #555; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 16px; background: #080808; border: 1px solid #1a1a1a; color: var(--accent); border-radius: 8px; box-sizing: border-box; font-family: monospace; }
        
        .upload-area { position: relative; display: flex; flex-direction: column; align-items: center; background: #0a0a0a; border: 2px dashed #333; padding: 30px; border-radius: 12px; cursor: pointer; color: #555; }
        .upload-area input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        .btn-action { background: var(--primary); color: #fff; border: none; width: 100%; padding: 20px; border-radius: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: #1a1a1a; color: #666; font-size: 0.7rem; }

        /* Vault Styles */
        #vault-viewer { display: none; padding: 20px; border-top: 1px solid #222; background: #080808; }
        .history-item { margin-bottom: 15px; padding: 12px; border: 1px solid #1a1a1a; border-radius: 8px; background: #000; }
        .link-btn { background: var(--accent); color: #000; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; cursor: pointer; margin-top: 8px; }

        #qr-result { display: none; text-align: center; padding: 40px 20px; background: #000; }
        #qrcode { display: inline-block; margin: 20px 0; padding: 10px; background: #fff; border-radius: 8px; }
        .sync-bar { background: #0a0a0a; padding: 15px 20px; border-top: 1px solid #222; display: flex; justify-content: space-between; font-size: 0.65rem; color: #444; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="active-link-banner">
        🔗 LINKED TO: <span id="link-name"></span>
        <span onclick="clearLink()" style="margin-left:10px; text-decoration:underline; cursor:pointer;">[REMOVE]</span>
    </div>

    <div class="app-header">
        <h1>Françe Farms</h1>
        <div class="subtitle">Sovereign Harvest Node</div>
    </div>

    <div id="main-form">
        <div class="step-box">
            <label>1. Current Batch ID</label>
            <input type="text" id="batchId" placeholder="e.g. jamun-processed-1">
        </div>

        <div class="step-box">
            <label>2. Take Photo</label>
            <div class="upload-area">
                <span style="font-size: 1.5rem;">📸</span>
                <span style="font-size: 0.7rem; margin-top:5px;">CAPTURE BATCH</span>
                <input type="file" id="imageInput" accept="image/*" onchange="addCrate()">
            </div>
            <div id="status-msg" style="font-size:0.6rem; color:var(--primary); margin-top:5px; text-align:center;"></div>
        </div>

        <div style="padding: 20px;">
            <button class="btn-action" onclick="finalizeSession()">Initialize Seal</button>
            <button class="btn-action btn-secondary" onclick="toggleVault()">View History / Link Previous</button>
        </div>
    </div>

    <div id="vault-viewer">
        <h2 style="font-size: 0.7rem; color: var(--primary); margin-bottom:15px;">SELECT A BATCH TO LINK</h2>
        <div id="history-items"></div>
    </div>

    <div id="qr-result">
        <h2 style="color:var(--primary); margin:0;">SEAL GENERATED</h2>
        <div id="qrcode"></div>
        <div id="hash-text" style="font-family:monospace; font-size:10px; color:#444; word-break: break-all;"></div>
        <button class="btn-action" onclick="resetSession()">START NEW HARVEST</button>
    </div>

    <div class="sync-bar">
        <div>GPS: <span id="gps-val">10.2040, -61.4531</span></div>
        <div>OUTBOX: <span id="outbox-val" style="color:var(--accent)">0</span></div>
    </div>
</div>

<script>
    let currentCrate = null;
    let parentHash = "GENESIS";
    let vault = JSON.parse(localStorage.getItem('françe_vault')) || [];

    updateOutboxUI();

    function addCrate() {
        const file = document.getElementById('imageInput').files[0];
        if(file) {
            currentCrate = { name: file.name, ts: Date.now() };
            document.getElementById('status-msg').innerText = "✅ Image ready for sealing";
        }
    }

    function toggleVault() {
        const viewer = document.getElementById('vault-viewer');
        viewer.style.display = viewer.style.display === 'none' ? 'block' : 'none';
        
        const items = document.getElementById('history-items');
        items.innerHTML = "";
        vault.forEach((rec, index) => {
            items.innerHTML += `
                <div class="history-item">
                    <div style="color:#fff; font-size:0.8rem;">${rec.batch}</div>
                    <div style="font-size:0.5rem; color:#444; word-break:break-all;">${rec.hash}</div>
                    <button class="link-btn" onclick="selectParent('${rec.hash}', '${rec.batch}')">USE AS PARENT</button>
                </div>`;
        });
    }

    function selectParent(hash, name) {
        parentHash = hash;
        document.getElementById('active-link-banner').style.display = 'block';
        document.getElementById('link-name').innerText = name;
        document.getElementById('vault-viewer').style.display = 'none';
        window.scrollTo(0,0);
    }

    function clearLink() {
        parentHash = "GENESIS";
        document.getElementById('active-link-banner').style.display = 'none';
    }

    async function finalizeSession() {
        const batch = document.getElementById('batchId').value;
        if(!batch || !currentCrate) return alert("Enter Batch ID and Take Photo");

        // The Chain: Current Data + Parent Hash
        const raw = batch + parentHash + JSON.stringify(currentCrate) + Date.now();
        const encoder = new TextEncoder();
        const data = encoder.encode(raw);
        const hashBuf = await crypto.subtle.digest('SHA-256', data);
        const hash = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');

        vault.unshift({ batch, hash, parent: parentHash, ts: Date.now() });
        localStorage.setItem('françe_vault', JSON.stringify(vault));
        updateOutboxUI();

        document.getElementById('main-form').style.display = 'none';
        document.getElementById('qr-result').style.display = 'block';
        document.getElementById('hash-text').innerText = hash;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: hash, width: 200, height: 200 });
    }

    function resetSession() {
        currentCrate = null;
        clearLink();
        document.getElementById('status-msg').innerText = "";
        document.getElementById('batchId').value = "";
        document.getElementById('main-form').style.display = 'block';
        document.getElementById('qr-result').style.display = 'none';
    }

    function updateOutboxUI() { document.getElementById('outbox-val').innerText = vault.length; }
</script>
</body>
</html>
