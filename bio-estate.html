<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scanner | Françe Farms</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
  <style>
    body { background: #080f08; color: #00e54a; font-family: 'Rajdhani', sans-serif; padding: 2rem; }
    .panel { border: 1px solid #1e3a1e; background: #0d180d; padding: 2rem; max-width: 600px; margin: 0 auto; }
    input, button { width: 100%; margin: 10px 0; padding: 10px; background: #000; border: 1px solid #00e54a; color: #00e54a; font-family: 'Share Tech Mono'; }
    button { background: #00e54a; color: #000; cursor: pointer; font-weight: bold; }
    .terminal { background: #000; padding: 15px; height: 200px; overflow-y: auto; font-size: 0.8rem; border: 1px solid #1e3a1e; }
    #preview { width: 100%; max-height: 200px; object-fit: contain; margin: 10px 0; display: none; }
  </style>
</head>
<body>

<div class="panel">
  <h2>BIO-ESTATE SCANNER</h2>
  <input type="file" id="fileInput" accept="image/*">
  <img id="preview">
  <input type="text" id="nodeId" value="GRANDE_01">
  <input type="text" id="batch" value="harvest-2026">
  <button id="uploadBtn">EXECUTE CRYPTO-TAGGING</button>
  <div class="terminal" id="term">Awaiting input...</div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const term = document.getElementById('term');
  const preview = document.getElementById('preview');

  fileInput.onchange = (e) => {
    preview.src = URL.createObjectURL(e.target.files[0]);
    preview.style.display = 'block';
    term.innerHTML += "<br>> Image loaded.";
  };

  uploadBtn.onclick = async () => {
    const file = fileInput.files[0];
    if (!file) return alert("Select image first");

    term.innerHTML += "<br>> Initializing transmission...";
    
    const formData = new FormData();
    formData.append('image', file);
    formData.append('node_id', document.getElementById('nodeId').value);
    formData.append('batch', document.getElementById('batch').value);
    formData.append('sha256', 'GEN_HASH_LOCAL'); // Simplified for testing

    try {
      const response = await fetch('https://api.francefarms.net/api/scans', {
        method: 'POST',
        body: formData
      });
      const data = await response.json();
      term.innerHTML += `<br>> SUCCESS: Record ${data.id} secured.`;
    } catch (err) {
      term.innerHTML += `<br>> ERROR: ${err.message}`;
    }
  };
</script>
</body>
</html>
