<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Françe Farms | Sovereign Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --bg: #050505;
            --card: #111;
            --text-main: #e0e0e0;
            --accent: #00ff41; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 10% 10%, #1a2a1a 0%, transparent 40%);
            color: var(--text-main);
            margin: 0; padding: 15px; box-sizing: border-box;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: var(--card);
            border: 1px solid #222;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .app-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }
        .app-header h1 { margin: 0; font-size: 1.4rem; color: #fff; }
        .subtitle { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        .step-box { padding: 25px 20px; border-bottom: 1px solid #222; }
        
        label { font-size: 0.7rem; color: #555; text-transform: uppercase; display: block; margin-bottom: 8px; }
        
        input[type="text"] {
            width: 100%; padding: 15px; background: #080808; border: 1px solid #1a1a1a;
            color: var(--accent); font-family: monospace; border-radius: 8px; box-sizing: border-box;
        }

        .upload-btn {
            display: flex; flex-direction: column; align-items: center;
            background: #0a0a0a; border: 2px dashed #333; padding: 30px;
            border-radius: 12px; cursor: pointer; color: #555;
        }

        .btn-action {
            background: var(--primary); color: #fff; border: none; width: 100%;
            padding: 20px; border-radius: 12px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; margin-top: 15px;
        }

        #photo-gallery { display: flex; gap: 10px; overflow-x: auto; margin-top: 15px; padding-bottom: 5px; }
        .thumb { width: 60px; height: 60px; border-radius: 6px; background-size: cover; border: 1px solid #333; flex-shrink: 0; }

        /* QR Result Overlay */
        #qr-result {
            display: none; text-align: center; padding: 40px 20px;
            background: #000; border-top: 4px solid var(--primary);
        }
        #qrcode { display: inline-block; margin: 20px 0; padding: 10px; background: #fff; border-radius: 8px; }
        
        /* The Outbox / Sync Bar */
        .sync-bar {
            background: #080808; padding: 12px 20px; border-top: 1px solid #222;
            display: flex; justify-content: space-between; font-size: 0.65rem; color: #444;
        }
        .sync-count { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <h1>Françe Farms</h1>
        <div class="subtitle">Sovereign Harvest Node</div>
    </div>

    <div id="main-form">
        <div class="step-box">
            <label>Batch Identifier</label>
            <input type="text" id="batchId" placeholder="e.g. GRANDE-MAR-30">
        </div>

        <div class="step-box">
            <label>Crate Snapshots (<span id="count">0</span>)</label>
            <label class="upload-btn" for="imageInput">
                <span style="font-size: 1.5rem;">📸</span>
                <span style="font-size: 0.7rem; margin-top:5px;">ADD CRATE PHOTO</span>
                <input type="file" id="imageInput" accept="image/*" onchange="addCrate(this)">
            </label>
            <div id="photo-gallery"></div>
        </div>

        <div style="padding: 20px;">
            <button class="btn-action" onclick="finalizeSession()">Initialize Harvest Seal</button>
        </div>
    </div>

    <div id="qr-result">
        <h2 style="color:var(--primary); margin:0;">SEAL GENERATED</h2>
        <div id="qrcode"></div>
        <div id="hash-text" style="font-family:monospace; font-size:9px; color:#333; margin-bottom:20px;"></div>
        <button class="btn-action" style="background:#222;" onclick="resetSession()">START NEW HARVEST</button>
    </div>

    <div class="sync-bar">
        <div>GPS: <span id="gps-val" style="color:#666;">Locking...</span></div>
        <div>VAULT OUTBOX: <span id="outbox-val" class="sync-count">0</span></div>
    </div>
</div>

<script>
    let currentCrates = [];
    let gpsCoords = "0,0";
    let vault = JSON.parse(localStorage.getItem('françe_vault')) || [];

    // 1. Initial Setup
    updateOutboxUI();
    navigator.geolocation.getCurrentPosition(pos => {
        gpsCoords = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        document.getElementById('gps-val').innerText = gpsCoords;
    });

    // 2. Add Crate Logic
    function addCrate(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            currentCrates.push({ name: file.name, time: Date.now() });
            
            // UI Update
            document.getElementById('count').innerText = currentCrates.length;
            const thumb = document.createElement('div');
            thumb.className = 'thumb';
            thumb.style.backgroundImage = `url(${URL.createObjectURL(file)})`;
            document.getElementById('photo-gallery').appendChild(thumb);
        }
    }

    // 3. Finalize & Save
    async function finalizeSession() {
        const batch = document.getElementById('batchId').value;
        if(!batch || currentCrates.length === 0) return alert("Missing Data");

        // Generate SHA-256
        const raw = batch + gpsCoords + JSON.stringify(currentCrates);
        const encoder = new TextEncoder();
        const data = encoder.encode(raw);
        const hashBuf = await crypto.subtle.digest('SHA-256', data);
        const hash = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');

        // SAVE TO LOCAL VAULT (The "Outbox")
        const record = { batch, hash, gps: gpsCoords, crates: currentCrates.length, ts: Date.now() };
        vault.push(record);
        localStorage.setItem('françe_vault', JSON.stringify(vault));
        updateOutboxUI();

        // UI Swap
        document.getElementById('main-form').style.display = 'none';
        document.getElementById('qr-result').style.display = 'block';
        document.getElementById('hash-text').innerText = hash;
        
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: hash, width: 180, height: 180 });
    }

    function resetSession() {
        // Clear local variables but vault stays in localStorage
        currentCrates = [];
        document.getElementById('count').innerText = "0";
        document.getElementById('photo-gallery').innerHTML = "";
        document.getElementById('batchId').value = "";
        document.getElementById('main-form').style.display = 'block';
        document.getElementById('qr-result').style.display = 'none';
    }

    function updateOutboxUI() {
        document.getElementById('outbox-val').innerText = vault.length;
    }
</script>

</body>
</html>
