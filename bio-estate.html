<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Françe Farms | Sovereign Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4CAF50; --bg: #050505; --card: #111; --text-main: #e0e0e0; --accent: #00ff41; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 10px; }
        .app-container { max-width: 480px; margin: 0 auto; background: var(--card); border: 1px solid #222; border-radius: 24px; overflow: hidden; position: relative; min-height: 90vh; }
        #link-banner { display: none; background: #1b331b; color: var(--accent); padding: 12px; font-size: 0.65rem; border-bottom: 1px solid var(--accent); text-align: center; }
        .clear-link { margin-left: 10px; color: #ff5f56; cursor: pointer; font-weight: bold; text-decoration: underline; }
        .step-box { padding: 20px; border-bottom: 1px solid #222; }
        label { font-size: 0.7rem; color: #555; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 16px; background: #080808; border: 1px solid #1a1a1a; color: var(--accent); border-radius: 8px; box-sizing: border-box; font-family: monospace; }
        .upload-area { display: flex; flex-direction: column; align-items: center; background: #0a0a0a; border: 2px dashed #333; padding: 30px; border-radius: 12px; cursor: pointer; position: relative;}
        .upload-area input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .btn-action { background: var(--primary); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-link { background: #1a1a1a; color: var(--primary); border: 1px solid #333; font-size: 0.7rem; flex: 1; padding: 10px; border-radius: 8px; }
        #reader { width: 100%; display: none; margin-bottom: 10px; border-radius: 12px; overflow: hidden; }
        #qr-result { display: none; text-align: center; padding: 30px; background: #000; }
        #qrcode { display: inline-block; margin: 20px 0; padding: 10px; background: #fff; border-radius: 8px; }
        #vault-viewer { display: none; padding: 20px; background: #080808; border-top: 1px solid #222; max-height: 400px; overflow-y: auto; }
        .history-item { margin-bottom: 10px; padding: 12px; border: 1px solid #222; border-radius: 8px; background: #000; }
        .sync-bar { background: #0a0a0a; padding: 15px 20px; border-top: 1px solid #222; display: flex; justify-content: space-between; font-size: 0.65rem; color: #444; font-family: monospace; }
        .gps-active { color: var(--accent); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="link-banner">
        🔗 LINKED TO: <span id="link-name-val"></span>
        <span class="clear-link" onclick="clearActiveLink()">[REMOVE]</span>
    </div>

    <div class="step-box" style="text-align: center;">
        <h1 style="margin:0; font-size: 1.2rem;">Françe Farms</h1>
        <div style="font-size: 0.6rem; color: var(--primary); letter-spacing: 2px;">SOVEREIGN HARVEST NODE</div>
    </div>

    <div id="main-form">
        <div class="step-box">
            <label>1. Identity & Provenance</label>
            <input type="text" id="batchId" placeholder="e.g. mango-arima-001">
            <div style="display: flex; gap: 8px; margin-top:10px;">
                <button class="btn-link" onclick="toggleVault()">📜 HISTORY</button>
                <button class="btn-link" onclick="startScanner()" style="background:var(--accent); color:#000;">📷 SCAN QR</button>
            </div>
            <div id="reader"></div>
        </div>

        <div class="step-box">
            <label>2. Visual Evidence</label>
            <div class="upload-area">
                <span style="font-size: 1.8rem;">📸</span>
                <span style="font-size: 0.7rem; color:#555; margin-top:5px;">TAP TO SNAP BATCH</span>
                <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect()">
            </div>
            <div id="img-check" style="font-size:0.6rem; color:var(--primary); text-align:center; margin-top:5px;"></div>
        </div>

        <div style="padding: 20px;">
            <button class="btn-action" onclick="finalizeSession()">Initialize Seal</button>
        </div>
    </div>

    <div id="vault-viewer">
        <h2 style="font-size: 0.7rem; color: var(--primary);">LOCAL HASH VAULT</h2>
        <div id="history-items"></div>
    </div>

    <div id="qr-result">
        <h2 style="color:var(--primary);">SEAL INITIALIZED</h2>
        <div id="qrcode"></div>
        <div id="hash-display" style="font-size:10px; color:#555; word-break:break-all;"></div>
        <button class="btn-action" onclick="location.reload()">NEW SESSION</button>
    </div>

    <div class="sync-bar">
        <div>LOC: <span id="gps-val" class="gps-active">LOCKING...</span></div>
        <div>VAULT: <span id="outbox-val" style="color:var(--accent)">0</span></div>
    </div>
</div>

<script>
    // --- SETTINGS ---
    const BACKEND_URL = "http://100.114.231.81:5000/api/log_produce"; 

    let activeParentHash = "GENESIS";
    let gpsCoords = "10.6400, -61.2700"; // Arima, T&T default
    let currentImageName = "no_image";
    let vault = JSON.parse(localStorage.getItem('françe_vault')) || [];
    let html5QrCode = null;

    // Safety check for UI elements
    function updateOutboxUI() {
        const outbox = document.getElementById('outbox-val');
        if(outbox) outbox.innerText = vault.length;
    }

    window.onload = () => { updateOutboxUI(); };

    navigator.geolocation.watchPosition(pos => {
        gpsCoords = `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
        const gpsEl = document.getElementById('gps-val');
        if(gpsEl) gpsEl.innerText = gpsCoords;
    }, null, { enableHighAccuracy: true });

    function handleImageSelect() {
        const file = document.getElementById('imageInput').files[0];
        if(file) {
            currentImageName = file.name;
            document.getElementById('img-check').innerText = `✅ Evidence: ${file.name}`;
        }
    }

    function clearActiveLink() {
        activeParentHash = "GENESIS";
        document.getElementById('link-banner').style.display = 'none';
    }

    async function syncToUbuntu(batchId, location, finalHash) {
        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ batch_id: batchId, origin: location, hash: finalHash })
            });
            return response.ok;
        } catch (e) { return false; }
    }

    async function finalizeSession() {
        const batch = document.getElementById('batchId').value;
        if(!batch) return alert("Enter a Batch ID");

        const rawString = batch + activeParentHash + gpsCoords + currentImageName + Date.now();
        const encoder = new TextEncoder();
        const data = encoder.encode(rawString);
        const hashBuf = await crypto.subtle.digest('SHA-256', data);
        const hash = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');

        vault.unshift({ batch, hash, location: gpsCoords, ts: Date.now() });
        localStorage.setItem('françe_vault', JSON.stringify(vault));
        updateOutboxUI();

        const synced = await syncToUbuntu(batch, gpsCoords, hash);

        document.getElementById('main-form').style.display = 'none';
        document.getElementById('qr-result').style.display = 'block';
        document.getElementById('hash-display').innerText = `HASH: ${hash} ${synced ? '[SYNCED]' : '[OFFLINE]'}`;
        
        new QRCode(document.getElementById("qrcode"), { text: hash, width: 200, height: 200 });
    }

    function toggleVault() {
        const v = document.getElementById('vault-viewer');
        v.style.display = v.style.display === 'block' ? 'none' : 'block';
        document.getElementById('history-items').innerHTML = vault.map(r => `
            <div class="history-item">
                <div style="font-weight:bold;">${r.batch}</div>
                <div style="font-size:0.5rem; color:var(--accent); word-break:break-all;">${r.hash}</div>
            </div>`).join('');
    }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            activeParentHash = text;
            document.getElementById('link-banner').style.display = 'block';
            document.getElementById('link-name-val').innerText = text.substring(0, 10) + "...";
            html5QrCode.stop();
            document.getElementById('reader').style.display = 'none';
        }).catch(() => {
            alert("Camera access required for scanning.");
        });
    }
</script>
</body>
</html>
