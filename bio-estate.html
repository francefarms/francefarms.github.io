<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner | Françe Farms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080f08;
      --bg2:       #0d180d;
      --bg3:       #111f11;
      --border:    #1e3a1e;
      --green:     #00e54a;
      --green-dim: #00a835;
      --green-muted: #1a4a1a;
      --text:      #c8e6c8;
      --text-dim:  #6b9e6b;
      --amber:     #f0a500;
      --red:       #e53535;
      --font-mono: 'Share Tech Mono', monospace;
      --font-head: 'Bebas Neue', sans-serif;
      --font-body: 'Rajdhani', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,74,0.018) 2px, rgba(0,229,74,0.018) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* === NAV === */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(8,15,8,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .nav-brand {
      font-family: var(--font-head);
      font-size: 1.8rem;
      letter-spacing: 0.12em;
      color: var(--green);
      text-shadow: 0 0 18px rgba(0,229,74,0.5);
      text-decoration: none;
    }

    nav ul { list-style: none; display: flex; gap: 2.5rem; align-items: center; }
    nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: 0.2s;
    }
    nav a:hover, nav a.active { color: var(--green); text-shadow: 0 0 10px rgba(0,229,74,0.6); }

    .nav-status { font-family: var(--font-mono); font-size: 0.7rem; color: var(--green); display: flex; align-items: center; gap: 0.5rem; }
    .pulse { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); animation: pulse 1.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* === LAYOUT === */
    .scanner-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .page-header { grid-column: 1 / -1; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .page-header .label { font-family: var(--font-mono); font-size: 0.65rem; color: var(--green); letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .page-header h1 { font-family: var(--font-head); font-size: 3rem; letter-spacing: 0.08em; color: #fff; }
    .page-header h1 em { font-style: normal; color: var(--green); text-shadow: 0 0 25px rgba(0,229,74,0.4); }

    .panel { background: var(--bg2); border: 1px solid var(--border); }
    .panel-header {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--green);
      letter-spacing: 0.2em;
      background: rgba(0,229,74,0.04);
      display: flex;
      justify-content: space-between;
    }

    .panel-body { padding: 1.5rem; }

    /* === DROP ZONE === */
    .drop-zone {
      border: 2px dashed var(--green-muted);
      background: rgba(0,229,74,0.02);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: 0.2s;
    }
    .drop-zone:hover { border-color: var(--green); background: rgba(0,229,74,0.06); }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    #preview-wrap { display: none; margin-top: 1rem; }
    #preview-wrap.visible { display: block; }
    #preview-img { width: 100%; max-height: 250px; object-fit: cover; border: 1px solid var(--border); }

    /* === FORM === */
    .field-group { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    label { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; display: block; margin-bottom: 0.3rem; }
    
    input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.6rem;
      width: 100%;
      outline: none;
    }
    input[readonly] { background: var(--bg3); color: var(--green-dim); cursor: default; }

    .btn-execute {
      margin-top: 1.5rem;
      width: 100%;
      padding: 1rem;
      background: var(--green);
      color: var(--bg);
      font-family: var(--font-mono);
      font-weight: 700;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
    }
    .btn-execute:disabled { opacity: 0.3; cursor: not-allowed; }

    /* === OUTPUT === */
    .terminal { background: var(--bg); padding: 1rem; font-family: var(--font-mono); font-size: 0.75rem; min-height: 300px; overflow-y: auto; line-height: 1.6; }
    .line { display: flex; gap: 0.5rem; margin-bottom: 0.2rem; }
    .line-ok { color: var(--green); }
    .line-err { color: var(--red); }
    
    .db-status { 
        margin-top: 1rem; 
        padding: 0.8rem; 
        border: 1px solid var(--border); 
        font-family: var(--font-mono); 
        font-size: 0.7rem; 
        display: none; 
    }
    .success { border-color: var(--green); color: var(--green); background: rgba(0,229,74,0.05); }

    @media (max-width: 768px) { .scanner-wrapper { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">FRANÇE FARMS</a>
  <ul>
    <li><a href="index.html">Sovereign Node</a></li>
    <li><a href="bio-estate.html" class="active">Scanner</a></li>
  </ul>
  <div class="nav-status"><div class="pulse"></div> SCANNER_READY</div>
</nav>

<div class="scanner-wrapper">
  <div class="page-header">
    <div class="label">// bio-estate :: crypto-tagging module</div>
    <h1>IMAGE <em>SCANNER</em></h1>
  </div>

  <div class="panel">
    <div class="panel-header"><span>[ INPUT_NODE ]</span></div>
    <div class="panel-body">
      <div class="drop-zone">
        <input type="file" id="file-input" accept="image/*" />
        <div class="drop-text"><strong>CLICK OR DROP IMAGE</strong></div>
      </div>
      
      <div id="preview-wrap"><img id="preview-img" src="" /></div>

      <div class="field-group">
        <div class="field-row">
          <div><label>Node ID</label><input type="text" id="node-id" value="GRANDE_01" /></div>
          <div><label>Batch</label><input type="text" id="batch" value="julie-harvest-2026" /></div>
        </div>
        <div>
          <label>API Endpoint (Secure Tunnel)</label>
          <input type="text" id="api-url" value="https://api.francefarms.net/api/scans" readonly />
        </div>
      </div>

      <button class="btn-execute" id="execute-btn" disabled>⬡ &nbsp;EXECUTE CRYPTO-TAGGING</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header"><span>[ SYSTEM_OUTPUT ]</span></div>
    <div class="terminal" id="terminal">
      <div class="line"><span class="line-ok">> System initialized. Awaiting capture...</span></div>
    </div>
    <div id="db-status" class="db-status"></div>
  </div>
</div>

<script>
  let selectedFile = null;
  const term = document.getElementById('terminal');

  function log(msg, type='') {
    const div = document.createElement('div');
    div.className = `line ${type ? 'line-'+type : ''}`;
    div.innerHTML = `<span>[${new Date().toLocaleTimeString()}]</span> <span>${msg}</span>`;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
  }

  async function hashFile(file) {
    const buffer = await file.arrayBuffer();
    const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  document.getElementById('file-input').addEventListener('change', e => {
    selectedFile = e.target.files[0];
    if (selectedFile) {
      document.getElementById('preview-img').src = URL.createObjectURL(selectedFile);
      document.getElementById('preview-wrap').classList.add('visible');
      document.getElementById('execute-btn').disabled = false;
      log(`Image loaded: ${selectedFile.name}`, 'ok');
    }
  });

  document.getElementById('execute-btn').addEventListener('click', async () => {
    const btn = document.getElementById('execute-btn');
    btn.disabled = true;
    log('Generating SHA-256 Geo-Lock Seal...');
    
    try {
      const hash = await hashFile(selectedFile);
      log(`Hash generated: ${hash.substring(0, 24)}...`, 'ok');
      
      // Prepare Multipart Form Data
      const formData = new FormData();
      formData.append('image', selectedFile);
      formData.append('node_id', document.getElementById('node-id').value);
      formData.append('batch', document.getElementById('batch').value);
      formData.append('sha256', hash);

      log('Transmitting to Arima Node via Secure Tunnel...');
      
      const response = await fetch(document.getElementById('api-url').value, {
        method: 'POST',
        body: formData // No Headers needed, browser sets Content-Type for FormData
      });

      if (response.ok) {
        const result = await response.json();
        log(`Success. Record ID: ${result.id}`, 'ok');
        const status = document.getElementById('db-status');
        status.style.display = 'block';
        status.className = 'db-status success';
        status.innerHTML = `✓ CRYPTO-TAG VERIFIED & STORED IN SOVEREIGN VAULT (ID: ${result.id})`;
      } else {
        throw new Error(`Server returned ${response.status}`);
      }
    } catch (err) {
      log(`CRITICAL ERROR: ${err.message}`, 'err');
    } finally {
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
