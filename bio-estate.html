<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner | Françe Farms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    :root {
      --bg: #080f08; --bg2: #0d180d; --border: #1e3a1e;
      --green: #00e54a; --green-dim: #00a835; --green-muted: #1a4a1a;
      --text: #c8e6c8; --font-mono: 'Share Tech Mono', monospace;
      --font-head: 'Bebas Neue', sans-serif; --font-body: 'Rajdhani', sans-serif;
      --error-red: #ff4444;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; margin: 0; }
    
    /* Scanline Effect */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,74,0.015) 2px, rgba(0,229,74,0.015) 4px);
      pointer-events: none; z-index: 9999;
    }

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      background: rgba(8,15,8,0.95); backdrop-filter: blur(8px);
    }
    .nav-brand { font-family: var(--font-head); font-size: 1.5rem; color: var(--green); text-decoration: none; letter-spacing: 2px; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { color: var(--text-dim); text-decoration: none; font-family: var(--font-mono); font-size: 0.75rem; transition: 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: var(--green); text-shadow: 0 0 10px var(--green); }

    .scanner-wrapper { max-width: 1100px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .page-header { grid-column: 1 / -1; margin-bottom: 10px; }
    .page-header h1 { font-family: var(--font-head); font-size: 3rem; color: #fff; letter-spacing: 2px; }
    .page-header h1 em { font-style: italic; color: var(--green); text-shadow: 0 0 15px rgba(0,229,74,0.4); }

    .panel { background: var(--bg2); border: 1px solid var(--border); position: relative; }
    .panel-header { padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.7rem; color: var(--green); background: rgba(0,229,74,0.05); }
    .panel-body { padding: 1.5rem; }

    .drop-zone { border: 2px dashed var(--green-muted); padding: 2rem; text-align: center; cursor: pointer; background: rgba(0,229,74,0.02); transition: 0.3s; }
    .drop-zone:hover { border-color: var(--green); background: rgba(0,229,74,0.1); }
    #preview-img { width: 100%; margin-top: 1rem; display: none; border: 1px solid var(--border); }
    
    input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--green); padding: 0.8rem; font-family: var(--font-mono); margin-top: 5px; outline: none; }
    label { font-family: var(--font-mono); font-size: 0.6rem; color: var(--green-dim); margin-top: 10px; display: block; }

    .btn-execute {
      width: 100%; padding: 1.2rem; margin-top: 1.5rem; background: var(--green); color: #000;
      font-family: var(--font-mono); font-weight: bold; border: none; cursor: pointer;
      clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 5% 100%, 0 80%);
      transition: 0.2s;
    }
    .btn-execute:active { transform: scale(0.98); }

    .terminal { background: #000; height: 320px; padding: 1rem; font-family: var(--font-mono); font-size: 0.75rem; overflow-y: auto; border: 1px solid var(--border); color: var(--green-dim); }
    .log-entry { margin-bottom: 0.4rem; border-left: 2px solid var(--green-muted); padding-left: 10px; }
    .log-success { color: var(--green); text-shadow: 0 0 8px var(--green); }
    .log-error { color: var(--error-red); border-left-color: var(--error-red); }

    #qr-result { margin-top: 20px; display: none; text-align: center; background: #fff; padding: 20px; border-radius: 2px; }
    #qr-result p { color: #000; font-family: var(--font-mono); font-weight: bold; font-size: 0.8rem; margin-bottom: 10px; }
    #qrcode { display: inline-block; }

    @media (max-width: 768px) { .scanner-wrapper { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">FRANÇE FARMS</a>
  <div class="nav-links">
    <a href="index.html">DASHBOARD</a>
    <a href="bio-estate.html" class="active">SCANNER</a>
    <a href="vault.html">VAULT</a>
  </div>
</nav>

<div class="scanner-wrapper">
  <div class="page-header"><h1>BIO-ESTATE <em>SCANNER</em></h1></div>

  <div class="panel">
    <div class="panel-header">[ HARVEST_INPUT ]</div>
    <div class="panel-body">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/*" style="display:none">
        <p id="drop-text">DRAG & DROP OR CLICK TO BIND IMAGE</p>
        <img id="preview-img" src="">
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div><label>NODE_ID</label><input type="text" id="node-id" value="GRANDE_01"></div>
        <div><label>BATCH_REF</label><input type="text" id="batch" value="MAY_2026_JULIE"></div>
      </div>
      <button class="btn-execute" id="execute-btn">EXECUTE CRYPTO-TAGGING</button>
      
      <div id="qr-result">
        <p>GENUINE HARVEST RECEIPT</p>
        <div id="qrcode"></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">[ SYSTEM_LOGS ]</div>
    <div class="terminal" id="terminal">
      <div class="log-entry">> Initializing Sovereign Node...</div>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://api.francefarms.net/api/scans";
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const terminal = document.getElementById('terminal');
  const previewImg = document.getElementById('preview-img');

  function log(msg, type = '') {
    const entry = document.createElement('div');
    entry.className = `log-entry ${type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : ''}`;
    entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    terminal.appendChild(entry);
    terminal.scrollTop = terminal.scrollHeight;
  }

  dropZone.onclick = () => fileInput.click();
  fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      previewImg.src = URL.createObjectURL(file);
      previewImg.style.display = 'block';
      document.getElementById('drop-text').style.display = 'none';
      log(`Image bound: ${file.name}`);
    }
  };

  async function generateHash(file) {
    const buffer = await file.arrayBuffer();
    const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  document.getElementById('execute-btn').onclick = async () => {
    const file = fileInput.files[0];
    if (!file) return log("ERROR: No data in buffer.", "error");

    log("Generating SHA-256 Integrity Hash...");
    const hash = await generateHash(file);
    
    const formData = new FormData();
    formData.append('image', file);
    formData.append('node_id', document.getElementById('node-id').value);
    formData.append('batch', document.getElementById('batch').value);
    formData.append('sha256', hash);

    log("Transmitting to Arima Node...");

    try {
      const response = await fetch(API_URL, { method: 'POST', body: formData });
      if (response.ok) {
        const data = await response.json();
        log(`VAULT ACKNOWLEDGED. Record: ${data.id}`, "success");
        
        document.getElementById('qr-result').style.display = 'block';
        document.getElementById('qrcode').innerHTML = ""; 
        new QRCode(document.getElementById("qrcode"), {
          text: `https://www.francefarms.net/verify.html?hash=${hash}`,
          width: 140, height: 140
        });
        log("Security QR Generated.");

      } else {
        throw new Error(`Node rejected data (Status: ${response.status})`);
      }
    } catch (err) {
      log(`CRITICAL_ERROR: ${err.message}`, "error");
    }
  };
</script>
</body>
</html>
