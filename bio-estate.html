<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Scanner | Françe Farms</title>
    <style>
        :root { --primary: #4CAF50; --accent: #00ff41; --glass: rgba(10, 10, 10, 0.95); }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; display: flex; justify-content: center; padding-top: 50px; }
        .scanner-unit { background: var(--glass); border: 1px solid rgba(0,255,65,0.2); border-radius: 28px; padding: 25px; width: 350px; text-align: center; }
        .snap-zone { width: 100%; aspect-ratio: 1/1; border: 1px dashed rgba(0,255,65,0.3); border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .btn-execute { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="scanner-unit">
        <div id="system-status">[ SYSTEM STANDBY ]</div>
        <div class="snap-zone" onclick="document.getElementById('upload').click()">
            <img id="preview-img" style="width:100%; display:none;">
            <span id="upload-icon">⛶</span>
            <input type="file" id="upload" hidden onchange="handlePreview(this)">
        </div>
        <input type="text" id="batch-name" placeholder="Enter Batch Label..." style="width:100%; padding:10px; margin-bottom:10px;">
        <button class="btn-execute" onclick="runTagging()">Execute Crypto-Tagging</button>
    </div>

    <script>
        function handlePreview(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('preview-img');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('upload-icon').style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }

        async function runTagging() {
            const batch = document.getElementById('batch-name').value;
            const status = document.getElementById('system-status');
            const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(Date.now() + batch));
            const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

            status.innerText = "[ SEALING... ]";
            
            // POINTED TO YOUR NEW SECURE SUBDOMAIN
            fetch('https://api.francefarms.net/upload_hash', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ batch_name: batch, hash: hashHex })
            })
            .then(r => r.json())
            .then(data => status.innerText = "[ VAULT SECURED ]")
            .catch(err => status.innerText = "[ ERROR ]");
        }
    </script>
</body>
</html>
