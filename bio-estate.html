<script>
  /* ─── NAVIGATION, THEME, AND TIMELINE LOGIC REMAINS UNCHANGED ─── */
  // (Keep your existing functions: showPage, themeToggle, and runTimeline above this point)

  /* ─── UPDATED LOCAL SOVEREIGN SCANNER ENGINE LOGIC ─── */
  const executeBtn = document.getElementById('execute-btn');
  const consoleEl = document.getElementById('terminal-console');
  const qrResultBlock = document.getElementById('qr-result');
  const qrCodeContainer = document.getElementById('qrcode');

  function appendTerminalLog(message, type = 'normal') {
    const entry = document.createElement('div');
    entry.classList.add('log-entry');
    if (type === 'success') entry.classList.add('log-success');
    if (type === 'error') entry.classList.add('log-error');
    const timestamp = new Date().toISOString().slice(11, 19);
    entry.textContent = `[${timestamp}] ${message}`;
    consoleEl.appendChild(entry);
    consoleEl.scrollTop = consoleEl.scrollHeight;
  }

  executeBtn.addEventListener('click', async () => {
    if (!activeIngestedFile) {
      appendTerminalLog("Execution Blocked: Image buffer empty.", "error");
      return;
    }

    executeBtn.disabled = true;
    qrResultBlock.style.display = 'none';
    qrCodeContainer.innerHTML = '';
    
    appendTerminalLog(`Initializing cryptographic pipeline...`);
    
    try {
      const realFileHash = await computeFileSHA256(activeIngestedFile);
      const manifestPayload = {
        node_id: document.getElementById('node-id').value.trim() || "UNKNOWN",
        batch_ref: document.getElementById('batch').value.trim() || "UNKNOWN",
        immutable_sha256: realFileHash,
        timestamp_utc: new Date().toISOString()
      };

      appendTerminalLog("Dispatching ledger block via secure HTTPS proxy...");
      
      const response = await fetch(`/api/scans?t=${Date.now()}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(manifestPayload)
      });

      if (!response.ok) throw new Error(`Gateway returned status ${response.status}`);

      await response.json();
      appendTerminalLog("Upstream Handshake: Transaction logged successfully.", "success");
      
      // ── OPTIMIZED QR GENERATION (Fixes Overflow) ──
      // Minimized to prevent exceeding 1056 bits
      new QRCode(qrCodeContainer, {
        text: JSON.stringify({ 
            n: manifestPayload.node_id, 
            h: realFileHash.substring(0, 16) 
        }),
        width: 160, 
        height: 160,
        colorDark: "#0f3d22", 
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.L
      });

      qrResultBlock.style.display = 'block';
      appendTerminalLog("Sovereign verification manifest sealed.", "success");
      
    } catch (err) {
      appendTerminalLog(`Pipeline execution fault: ${err.message}`, "error");
    } finally {
      executeBtn.disabled = false;
    }
  });
</script>
