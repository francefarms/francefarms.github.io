<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Françe Farms | Sovereign Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #4CAF50; --bg: #050505; --card: #111; --text-main: #e0e0e0; --accent: #00ff41; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 15px; }
        .app-container { max-width: 480px; margin: 0 auto; background: var(--card); border: 1px solid #222; border-radius: 24px; overflow: hidden; }
        .app-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid #222; }
        .subtitle { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        .step-box { padding: 20px; border-bottom: 1px solid #222; }
        label { font-size: 0.7rem; color: #555; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 16px; background: #080808; border: 1px solid #1a1a1a; color: var(--accent); border-radius: 8px; box-sizing: border-box; font-family: monospace; }
        
        /* Linked Badge */
        #linked-badge { display: none; background: rgba(0, 255, 65, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 10px; border-radius: 8px; font-size: 0.7rem; margin-top: 10px; word-break: break-all; }

        .upload-area { position: relative; display: flex; flex-direction: column; align-items: center; background: #0a0a0a; border: 2px dashed #333; padding: 30px; border-radius: 12px; cursor: pointer; color: #555; }
        .upload-area input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .btn-action { background: var(--primary); color: #fff; border: none; width: 100%; padding: 20px; border-radius: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-link { background: #1a1a1a; color: var(--primary); border: 1px solid #333; font-size: 0.75rem; margin-top: 5px; }
        
        #photo-gallery { display: flex; gap: 10px; overflow-x: auto; margin-top: 15px; }
        .thumb { width: 60px; height: 60px; border-radius: 6px; background-size: cover; border: 1px solid #333; flex-shrink: 0; }
        
        #qr-result { display: none; text-align: center; padding: 40px 20px; background: #000; }
        #qrcode { display: inline-block; margin: 20px 0; padding: 10px; background: #fff; border-radius: 8px; }
        
        /* Vault Overlay */
        #vault-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .vault-item { background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        
        .sync-bar { background: #0a0a0a; padding: 15px 20px; border-top: 1px solid #222; display: flex; justify-content: space-between; font-size: 0.65rem; color: #444; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <h1>Françe Farms</h1>
        <div class="subtitle">Sovereign Harvest Node</div>
    </div>

    <div id="main-form">
        <div class="step-box">
            <label>1. Batch Info</label>
            <input type="text" id="batchId" placeholder="e.g. ST-AUGUSTINE-CLEAN">
            
            <button class="btn-action btn-link" onclick="openVaultToLink()">🔗 LINK TO PREVIOUS HARVEST</button>
            <div id="linked-badge">🔗 LINKED TO: <span id="parent-hash-display"></span></div>
        </div>

        <div class="step-box">
            <label>2. Crate Snapshots (<span id="count" style="color:var(--accent)">0</span>)</label>
            <div class="upload-area">
                <span style="font-size: 1.5rem;">📸</span>
                <span style="font-size: 0.7rem; margin-top:5px;">ADD PHOTO</span>
                <input type="file" id="imageInput" accept="image/*" onchange="addCrate(this)">
            </div>
            <div id="photo-gallery"></div>
        </div>

        <div style="padding: 20px;">
            <button class="btn-action" onclick="finalizeSession()">Initialize Seal</button>
        </div>
    </div>

    <div id="qr-result">
        <h2 style="color:var(--primary); margin:0;">SEAL GENERATED</h2>
        <div id="qrcode"></div>
        <div id="hash-text" style="font-family:monospace; font-size:10px; color:#444; margin-bottom:20px; word-break: break-all;"></div>
        <button class="btn-action" style="background:#222;" onclick="resetSession()">START NEW SESSION</button>
    </div>

    <div class="sync-bar">
        <div>GPS: <span id="gps-val">Locking...</span></div>
        <div>VAULT: <span id="outbox-val" style="color:var(--accent)">0</span></div>
    </div>
</div>

<div id="vault-overlay">
    <h2 style="color:var(--primary);">Select Parent Hash</h2>
    <p style="color:#666; font-size:0.8rem; margin-bottom:20px;">Tap a previous harvest to link it to this new session.</p>
    <div id="vault-list"></div>
    <button class="btn-action" style="background:#333;" onclick="document.getElementById('vault-overlay').style.display='none'">CANCEL</button>
</div>

<script>
    let currentCrates = [];
    let gpsCoords = "0,0";
    let parentHash = "GENESIS";
    let vault = JSON.parse(localStorage.getItem('françe_vault')) || [];

    updateOutboxUI();

    navigator.geolocation.getCurrentPosition(pos => {
        gpsCoords = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        document.getElementById('gps-val').innerText = gpsCoords;
    });

    function addCrate(input) {
        if (input.files && input.files[0]) {
            currentCrates.push({ name: input.files[0].name, time: Date.now() });
            document.getElementById('count').innerText = currentCrates.length;
            const thumb = document.createElement('div');
            thumb.className = 'thumb';
            thumb.style.backgroundImage = `url(${URL.createObjectURL(input.files[0])})`;
            document.getElementById('photo-gallery').appendChild(thumb);
        }
    }

    function openVaultToLink() {
        const overlay = document.getElementById('vault-overlay');
        const list = document.getElementById('vault-list');
        overlay.style.display = 'block';
        list.innerHTML = "";
        
        vault.forEach(rec => {
            const item = document.createElement('div');
            item.className = 'vault-item';
            item.innerHTML = `<div style="color:#fff;">${rec.batch}</div><div style="color:var(--accent); font-size:0.6rem; word-break:break-all;">${rec.hash}</div>`;
            item.onclick = () => {
                parentHash = rec.hash;
                document.getElementById('parent-hash-display').innerText = rec.hash.substring(0,20) + "...";
                document.getElementById('linked-badge').style.display = 'block';
                overlay.style.display = 'none';
            };
            list.appendChild(item);
        });
    }

    async function finalizeSession() {
        const batch = document.getElementById('batchId').value;
        if(!batch || currentCrates.length === 0) return alert("Missing Info");

        const raw = batch + gpsCoords + parentHash + JSON.stringify(currentCrates) + Date.now();
        const encoder = new TextEncoder();
        const data = encoder.encode(raw);
        const hashBuf = await crypto.subtle.digest('SHA-256', data);
        const hash = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');

        vault.unshift({ batch, hash, parent: parentHash, gps: gpsCoords, ts: Date.now() });
        localStorage.setItem('françe_vault', JSON.stringify(vault));
        updateOutboxUI();

        document.getElementById('main-form').style.display = 'none';
        document.getElementById('qr-result').style.display = 'block';
        document.getElementById('hash-text').innerText = hash;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: hash, width: 200, height: 200 });
    }

    function resetSession() {
        currentCrates = [];
        parentHash = "GENESIS";
        document.getElementById('linked-badge').style.display = 'none';
        document.getElementById('main-form').style.display = 'block';
        document.getElementById('qr-result').style.display = 'none';
        document.getElementById('photo-gallery').innerHTML = "";
    }

    function updateOutboxUI() { document.getElementById('outbox-val').innerText = vault.length; }
</script>
</body>
</html>
