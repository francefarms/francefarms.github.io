<script>
  /* ─── TAB ENGINE ─── */
  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
    document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
    
    const targetPage = document.getElementById(pageId);
    if(targetPage) targetPage.classList.add('active');
    
    const activeLink = document.getElementById(`link-${pageId}`);
    if(activeLink) activeLink.classList.add('active');
    
    document.querySelector('.nav-links').classList.remove('open');
    window.scrollTo(0, 0);
  }

  document.querySelector('.nav-hamburger').addEventListener('click', () => {
    document.querySelector('.nav-links').classList.toggle('open');
  });

  /* ─── THEME CONFIGURATION ─── */
  const themeToggle = document.getElementById('themeToggle');
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-theme');
    themeToggle.textContent = '🌙';
  }
  themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-theme');
    const isDark = document.body.classList.contains('dark-theme');
    themeToggle.textContent = isDark ? '🌙' : '☀️';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });

  /* ─── CORE SCANNER LOGIC & TELEMETRY ─── */
  const API_URL = "https://api.francefarms.net/api/scans";
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const terminalConsole = document.getElementById('terminal-console');
  const previewImg = document.getElementById('preview-img');
  const lensGlyph = document.getElementById('lens-glyph');
  const executeBtn = document.getElementById('execute-btn');

  // Custom Logger targeting your UI terminal component
  function consoleLog(msg, type = '') {
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.textContent = msg;
    terminalConsole.appendChild(entry);
    terminalConsole.scrollTop = terminalConsole.scrollHeight; // Auto-scrolls terminal
  }

  // File Upload Visual Triggers
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        previewImg.src = event.target.result;
        previewImg.style.display = 'block';
        lensGlyph.style.display = 'none';
        document.getElementById('drop-text').style.display = 'none';
        consoleLog(`> Image bound successfully: ${file.name}`);
      };
      reader.readAsDataURL(file);
    }
  });

  // GPS Telemetry Execution Trigger
  executeBtn.addEventListener('click', () => {
    consoleLog("> Initializing Geolocation verification protocol...");

    if (!navigator.geolocation) {
      consoleLog("[ERROR] Geolocation is blocked or unsupported by this browser environment.", "log-error");
      return;
    }

    // Trigger native browser permission handshake
    navigator.geolocation.getCurrentPosition(
      (position) => {
        const latitude = position.coords.latitude;
        const longitude = position.coords.longitude;
        const accuracy = position.coords.accuracy;

        consoleLog(`[SUCCESS] GPS Fixed: Lat ${latitude.toFixed(4)}°, Lon ${longitude.toFixed(4)}° (Accuracy: ±${accuracy.toFixed(1)}m)`, "log-success");

        // Proceed to transmit data to sovereign backend
        sendDataToBackend(latitude, longitude);
      },
      (error) => {
        switch(error.code) {
          case error.PERMISSION_DENIED:
            consoleLog("[ERROR] Access Denied: Operator rejected location permissions.", "log-error");
            alert("Françe Farms requires device location access to authenticate batch provenance.");
            break;
          case error.POSITION_UNAVAILABLE:
            consoleLog("[ERROR] Telemetry Failed: Satellite linkage unavailable.", "log-error");
            break;
          case error.TIMEOUT:
            consoleLog("[ERROR] Telemetry Failed: Core location handshake timed out.", "log-error");
            break;
        }
      },
      {
        enableHighAccuracy: true,
        timeout: 12000,
        maximumAge: 0
      }
    );
  });

  function sendDataToBackend(lat, lon) {
    const nodeId = document.getElementById('node-id').value;
    const batchRef = document.getElementById('batch').value;

    const payload = {
      node_id: nodeId,
      batch_ref: batchRef,
      latitude: lat,
      longitude: lon,
      timestamp: new Date().toISOString()
    };

    consoleLog(`> Payload block compiled cleanly. Transmitting telemetry profiles to database backend...`);
    consoleLog(`> Data: ${JSON.stringify(payload)}`);
    
    // Once backend endpoints are live, append fetch pipeline here:
    // fetch(API_URL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'application/json' } })
  }
</script>
