<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner | Françe Farms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080f08;
      --bg2:       #0d180d;
      --bg3:       #111f11;
      --border:    #1e3a1e;
      --green:     #00e54a;
      --green-dim: #00a835;
      --green-muted: #1a4a1a;
      --text:      #c8e6c8;
      --text-dim:  #6b9e6b;
      --amber:     #f0a500;
      --red:       #e53535;
      --font-mono: 'Share Tech Mono', monospace;
      --font-head: 'Bebas Neue', sans-serif;
      --font-body: 'Rajdhani', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,229,74,0.018) 2px,
        rgba(0,229,74,0.018) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* === NAV === */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(8,15,8,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .nav-brand {
      font-family: var(--font-head);
      font-size: 1.8rem;
      letter-spacing: 0.12em;
      color: var(--green);
      text-shadow: 0 0 18px rgba(0,229,74,0.5);
      text-decoration: none;
    }

    nav ul { list-style: none; display: flex; gap: 2.5rem; align-items: center; }
    nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.2s, text-shadow 0.2s;
    }
    nav a:hover, nav a.active { color: var(--green); text-shadow: 0 0 10px rgba(0,229,74,0.6); }

    /* === MAIN LAYOUT === */
    .scanner-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .page-header {
      grid-column: 1 / -1;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .page-header .label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--green);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .page-header h1 {
      font-family: var(--font-head);
      font-size: 3rem;
      letter-spacing: 0.08em;
      color: #fff;
    }

    .page-header h1 em {
      font-style: normal;
      color: var(--green);
      text-shadow: 0 0 25px rgba(0,229,74,0.4);
    }

    .drop-zone-panel { background: var(--bg2); border: 1px solid var(--border); }

    .panel-header {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--green);
      letter-spacing: 0.2em;
      background: rgba(0,229,74,0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-body { padding: 1.5rem; }

    .drop-zone {
      border: 2px dashed var(--green-muted);
      background: rgba(0,229,74,0.02);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover { border-color: var(--green); background: rgba(0,229,74,0.06); }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    #preview-wrap { display: none; margin-top: 1rem; position: relative; }
    #preview-wrap.visible { display: block; }
    #preview-img { width: 100%; max-height: 260px; object-fit: cover; border: 1px solid var(--border); }

    .field-group { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.2rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    label { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.25em; text-transform: uppercase; }

    input[type="text"], input[type="date"], select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 0.55rem 0.8rem;
      outline: none;
    }
    input[readonly] { 
      background: rgba(0,229,74,0.03); 
      color: var(--green-dim); 
      border-style: solid; 
      cursor: default;
    }

    .btn-execute {
      margin-top: 1.2rem;
      width: 100%;
      padding: 1rem;
      background: var(--green);
      color: #080f08;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      font-weight: 700;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
    }

    .output-panel { background: var(--bg2); border: 1px solid var(--border); display: flex; flex-direction: column; }
    .terminal { flex: 1; padding: 1.2rem; font-family: var(--font-mono); font-size: 0.75rem; line-height: 1.8; min-height: 300px; overflow-y: auto; }
    .line { display: flex; gap: 0.8rem; }
    .line-time { color: var(--text-dim); min-width: 55px; }
    .line-prompt { color: var(--green-dim); }
    .line-text { color: var(--text); flex: 1; }
    .line-text.ok { color: var(--green); }

    .db-status { margin: 0 1rem 1rem; padding: 0.7rem 1rem; border: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.7rem; display: none; }
    .db-status.success { border-color: var(--green); color: var(--green); background: rgba(0,229,74,0.05); }

  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">FRANÇE FARMS</a>
  <div class="nav-status"><div class="pulse"></div> SCANNER_READY</div>
</nav>

<div class="scanner-wrapper">
  <div class="page-header">
    <div class="label">// bio-estate :: crypto-tagging module</div>
    <h1>IMAGE <em>SCANNER</em></h1>
  </div>

  <div class="drop-zone-panel">
    <div class="panel-header"><span>[ INPUT_NODE ]</span></div>
    <div class="panel-body">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/*" />
        <div class="drop-text"><strong>DROP IMAGE OR CLICK TO SELECT</strong></div>
      </div>
      <div id="preview-wrap"><img id="preview-img" src="" alt="Preview" /></div>

      <div class="field-group">
        <div class="field-row">
          <div class="field"><label>Node ID</label><input type="text" id="node-id" value="GRANDE_01" /></div>
          <div class="field"><label>Batch</label><input type="text" id="batch" value="julie-harvest-2026" /></div>
        </div>
        <div class="field">
          <label>API Endpoint (Encrypted Tunnel)</label>
          <input type="text" id="api-url" value="https://api.francefarms.net/api/scans" readonly />
        </div>
      </div>

      <button class="btn-execute" id="execute-btn" disabled>⬡ &nbsp;EXECUTE CRYPTO-TAGGING</button>
    </div>
  </div>

  <div class="output-panel">
    <div class="panel-header"><span>[ SYSTEM_OUTPUT ]</span></div>
    <div class="terminal" id="terminal">
      <div class="line"><span class="line-time">00:00</span><span class="line-prompt">$</span><span class="line-text ok">System ready.</span></div>
    </div>
    <div class="db-status" id="db-status"></div>
  </div>
</div>

<script>
  let selectedFile = null;
  const terminal = document.getElementById('terminal');

  function log(text, type = '') {
    const line = document.createElement('div');
    line.className = 'line';
    line.innerHTML = `<span class="line-time">${new Date().toTimeString().slice(0, 8)}</span><span class="line-prompt">></span><span class="line-text ${type}">${text}</span>`;
    terminal.appendChild(line);
  }

  document.getElementById('file-input').addEventListener('change', e => {
    selectedFile = e.target.files[0];
    document.getElementById('preview-img').src = URL.createObjectURL(selectedFile);
    document.getElementById('preview-wrap').classList.add('visible');
    document.getElementById('execute-btn').disabled = false;
    log(`File loaded: ${selectedFile.name}`, 'ok');
  });

  document.getElementById('execute-btn').addEventListener('click', async () => {
    log('Transmitting to secure Arima Node...');
    const payload = { node_id: "GRANDE_01", batch: "julie-harvest-2026", timestamp_utc: new Date().toISOString() };
    const apiUrl = document.getElementById('api-url').value;

    try {
      const res = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (res.ok) {
        log('Sovereign vault updated.', 'ok');
        document.getElementById('db-status').style.display = 'block';
        document.getElementById('db-status').className = 'db-status success';
        document.getElementById('db-status').innerHTML = '✓ RECORD SECURED IN LOCAL DATABASE';
      }
    } catch (e) {
      log('Connection failed. Check tunnel.', 'err');
    }
  });
</script>
</body>
</html>
