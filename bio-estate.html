<script>
    let activeParentHash = "GENESIS";
    let gpsCoords = "0,0";
    let currentImageName = "no_image";
    let vault = JSON.parse(localStorage.getItem('françe_vault')) || [];
    let html5QrCode = null;

    // REPLACE THIS WITH YOUR UBUNTU IP ADDRESS (e.g., "192.168.1.15")
    const BACKEND_URL = "http://YOUR_UBUNTU_IP:5000/api/log_produce";

    updateOutboxUI();

    navigator.geolocation.watchPosition(pos => {
        gpsCoords = `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
        document.getElementById('gps-val').innerText = gpsCoords;
    }, err => {
        document.getElementById('gps-val').innerText = "GPS Error";
    }, { enableHighAccuracy: true });

    function handleImageSelect() {
        const file = document.getElementById('imageInput').files[0];
        if(file) {
            currentImageName = file.name;
            document.getElementById('img-check').innerText = `✅ Evidence: ${file.name}`;
        }
    }

    // --- NEW: THE BACKEND SYNC FUNCTION ---
    async function syncToUbuntu(batchId, location, finalHash) {
        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    batch_id: batchId,
                    origin: location,
                    hash: finalHash // Sending the pre-computed hash for verification
                })
            });
            const result = await response.json();
            console.log("Sovereign Vault Sync:", result.status);
            return true;
        } catch (error) {
            console.error("Sync Failed. Data stored locally only.", error);
            return false;
        }
    }

    async function finalizeSession() {
        const batch = document.getElementById('batchId').value;
        const timestamp = Date.now();
        if(!batch) return alert("Please enter a Batch Identifier.");

        // THE CRYPTOGRAPHIC CHAIN
        const rawString = batch + activeParentHash + gpsCoords + currentImageName + timestamp;
        const encoder = new TextEncoder();
        const data = encoder.encode(rawString);
        const hashBuf = await crypto.subtle.digest('SHA-256', data);
        const hash = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');

        // 1. Save locally (Mobile Backup)
        vault.unshift({ batch, hash, parent: activeParentHash, location: gpsCoords, ts: timestamp });
        localStorage.setItem('françe_vault', JSON.stringify(vault));
        updateOutboxUI();

        // 2. TRIGGER BACKEND SYNC (The Bridge)
        const synced = await syncToUbuntu(batch, gpsCoords, hash);

        // 3. Show result UI
        document.getElementById('main-form').style.display = 'none';
        document.getElementById('qr-result').style.display = 'block';
        document.getElementById('hash-display').innerText = `HASH: ${hash} ${synced ? '[VAULT SYNCED]' : '[OFFLINE MODE]'}`;
        
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: hash, width: 220, height: 220 });
    }

    // UI Helper Functions
    function updateOutboxUI() { document.getElementById('outbox-val').innerText = vault.length; }
    function wipeVault() { if(confirm("Confirm: Delete all local hash history?")) { localStorage.removeItem('françe_vault'); location.reload(); } }
    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            applyLink(text, "Scanned Link");
            html5QrCode.stop();
            document.getElementById('reader').style.display = 'none';
        });
    }
    function applyLink(hash, name) {
        activeParentHash = hash;
        document.getElementById('link-banner').style.display = 'block';
        document.getElementById('link-name-val').innerText = name.substring(0, 15) + "...";
        document.getElementById('vault-viewer').style.display = 'none';
        window.scrollTo(0,0);
    }
    function clearActiveLink() { activeParentHash = "GENESIS"; document.getElementById('link-banner').style.display = 'none'; }
    function toggleVault() {
        const v = document.getElementById('vault-viewer');
        v.style.display = v.style.display === 'block' ? 'none' : 'block';
        const items = document.getElementById('history-items');
        items.innerHTML = vault.map(rec => `
            <div class="history-item">
                <div style="color:#fff; font-weight:bold;">${rec.batch}</div>
                <div style="font-size:0.5rem; color:var(--accent); word-break:break-all;">HASH: ${rec.hash}</div>
                <div style="font-size:0.55rem; color:#555;">📍 ${rec.location}</div>
                <button onclick="applyLink('${rec.hash}', '${rec.batch}')" class="btn-link" style="margin-top:8px; width:auto; padding:5px 10px;">LINK</button>
            </div>`).join('');
    }
</script>
