<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Françe Farms | Easy Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #4CAF50; --bg: #f9f9f9; --card: #ffffff; --text: #333; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .app-container { max-width: 500px; margin: auto; background: var(--card); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .app-header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; }
        .app-header h1 { margin: 0; font-size: 1.5rem; }
        
        .step-box { padding: 25px; border-bottom: 1px solid #eee; }
        .step-number { background: var(--primary); color: white; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.8rem; margin-right: 10px; }
        h2 { display: inline; font-size: 1rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        input[type="file"] { display: none; }
        .upload-btn { display: block; background: #f0f0f0; border: 2px dashed #ccc; padding: 40px 20px; text-align: center; border-radius: 12px; cursor: pointer; margin-top: 15px; color: #777; }
        .upload-btn:hover { border-color: var(--primary); background: #e8f5e9; }
        
        .action-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 20px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        #qr-result { display: none; text-align: center; padding: 30px; background: #fff; border-top: 5px solid var(--primary); }
        #qrcode { display: inline-block; margin: 20px 0; }
        
        .status-msg { font-family: monospace; font-size: 0.75rem; color: #888; margin-top: 10px; text-align: center; }
        #previewImg { width: 100%; border-radius: 12px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <h1>Françe Farms</h1>
        <p style="margin: 5px 0 0; font-size: 0.8rem; opacity: 0.8;">Sovereign Harvest Tracker</p>
    </div>

    <div id="setup-view">
        <div class="step-box">
            <span class="step-number">1</span><h2>Identification</h2>
            <input type="text" id="batchId" placeholder="Enter Crate/Batch Name" style="width:100%; padding:15px; margin-top:15px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
        </div>

        <div class="step-box">
            <span class="step-number">2</span><h2>Capture Photo</h2>
            <label class="upload-btn" for="imageInput">
                <span id="upload-label">📸 TAP TO TAKE PIC</span>
                <input type="file" id="imageInput" accept="image/*" onchange="handleFile(this)">
                <img id="previewImg">
            </label>
        </div>

        <div style="padding: 25px;">
            <button class="action-btn" onclick="generateSeal()">GENERATE HARVEST QR</button>
            <div id="status" class="status-msg">GPS: Awaiting Lock...</div>
        </div>
    </div>

    <div id="qr-result">
        <h2 style="color: var(--primary);">✅ SEAL GENERATED</h2>
        <p style="font-size: 0.8rem; color: #666;">Show this code at the next checkpoint</p>
        <div id="qrcode"></div>
        <div id="hash-display" style="font-family:monospace; font-size: 10px; color: #ccc; word-break: break-all;"></div>
        <button class="action-btn" style="background:#333;" onclick="location.reload()">START NEW SCAN</button>
    </div>
</div>

<script>
    let capturedGps = "Fetching...";

    // Grab GPS as soon as page loads
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            capturedGps = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
            document.getElementById('status').innerText = `GPS Locked: ${capturedGps}`;
        },
        () => { document.getElementById('status').innerText = "GPS Error: Please enable location"; }
    );

    function handleFile(input) {
        const preview = document.getElementById('previewImg');
        const label = document.getElementById('upload-label');
        if (input.files && input.files[0]) {
            preview.src = URL.createObjectURL(input.files[0]);
            preview.style.display = 'block';
            label.style.display = 'none';
        }
    }

    async function generateSeal() {
        const batch = document.getElementById('batchId').value;
        const file = document.getElementById('imageInput').files[0];

        if(!batch || !file) {
            alert("Please enter a Name and take a Photo!");
            return;
        }

        // Create the Hash (The Secret Math)
        const encoder = new TextEncoder();
        const data = encoder.encode(batch + capturedGps + Date.now());
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const finalHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        // Switch Views
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('qr-result').style.display = 'block';

        // Generate the QR Code containing the Hash
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: finalHash,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
        });

        document.getElementById('hash-display').innerText = "HASH: " + finalHash;
    }
</script>

</body>
</html>
