<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Harvest | Françe Farms</title>
    <style>
        body { background: #080f08; color: #00e54a; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .cert { border: 2px solid #1e3a1e; padding: 2rem; background: #0d180d; max-width: 400px; width: 90%; text-align: center; }
        .status { font-weight: bold; font-size: 1.5rem; margin-bottom: 1rem; color: #fff; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; border-bottom: 1px solid #1e3a1e; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div class="cert" id="cert">
        <div class="status">VERIFYING...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const hash = params.get('hash');

        async function verify() {
            if (!hash) {
                document.getElementById('cert').innerHTML = "ERROR: NO HASH PROVIDED";
                return;
            }

            try {
                const response = await fetch(`https://api.francefarms.net/api/verify/${hash}`);
                const result = await response.json();

                if (result.verified) {
                    const date = new Date(result.data.created_at).toLocaleDateString();
                    document.getElementById('cert').innerHTML = `
                        <div class="status" style="color: #00e54a;">✓ GENUINE HARVEST</div>
                        <div class="data-row"><span>BATCH:</span> <span>${result.data.batch}</span></div>
                        <div class="data-row"><span>ORIGIN:</span> <span>${result.data.node_id}</span></div>
                        <div class="data-row"><span>SECURED:</span> <span>${date}</span></div>
                        <p style="font-size: 0.6rem; color: #6b9e6b;">HASH: ${hash}</p>
                    `;
                } else {
                    document.getElementById('cert').innerHTML = `<div class="status" style="color: #ff4444;">⚠ FAKE OR UNVERIFIED</div>`;
                }
            } catch (e) {
                document.getElementById('cert').innerHTML = "SYSTEM OFFLINE";
            }
        }
        verify();
    </script>
</body>
</html>
