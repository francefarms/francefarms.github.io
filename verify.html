<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Françe Farms — Verify Record</title>
  <style>
    :root {
      --neon-green: #00ff66;
      --dark-bg: #0a0f0d;
      --panel-bg: #121b16;
      --border-color: #1f3328;
      --text-main: #e0e6e3;
    }
    body {
      background: var(--dark-bg);
      color: var(--text-main);
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 640px;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 25px;
    }
    h1 { color: var(--neon-green); font-size: 20px; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; }
    .lot-header {
      background: rgba(0,255,102,0.08); border: 1px solid var(--neon-green); border-radius: 4px;
      padding: 10px 14px; font-size: 0.8rem; margin-bottom: 20px; word-break: break-all;
    }
    .row { margin-bottom: 14px; }
    .row label { display: block; font-size: 12px; color: var(--neon-green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .row div { font-size: 14px; word-break: break-all; }
    .chain-step {
      border-left: 2px solid var(--neon-green);
      padding-left: 14px;
      margin-bottom: 18px;
    }
    .chain-step .event-type { color: var(--neon-green); font-weight: bold; text-transform: uppercase; }
    img { max-width: 100%; border-radius: 4px; border: 1px solid var(--border-color); margin-top: 8px; }
    .btn {
      display: inline-block;
      background: transparent;
      color: var(--neon-green);
      border: 1px solid var(--neon-green);
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 4px;
      margin-top: 16px;
      font-family: inherit;
      cursor: pointer;
    }
    .btn:hover { background: var(--neon-green); color: var(--dark-bg); }
    .error { color: #ff5555; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Provenance Verification</h1>
    <div id="content">Loading record...</div>
  </div>

  <script>
    const API_BASE = "https://api.francefarms.net";

    function getHashFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('hash');
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString();
    }

    async function loadChain() {
      const hash = getHashFromURL();
      const content = document.getElementById('content');

      if (!hash) {
        content.innerHTML = '<p class="error">No hash provided. Scan a valid Françe Farms QR code.</p>';
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/scans/${encodeURIComponent(hash)}/chain`);
        const data = await res.json();

        if (!res.ok || !data.chain || data.chain.length === 0) {
          content.innerHTML = '<p class="error">No record found for this hash.</p>';
          return;
        }

        const lotCode = data.chain[0].lot_code;
        let html = `<div class="lot-header">Traceability Lot Code: ${lotCode}</div>`;

        data.chain.forEach((record) => {
          html += `
            <div class="chain-step">
              <div class="event-type">${record.event_type || 'SCAN'}</div>
              <div class="row"><label>Node</label><div>${record.node_id || '—'}</div></div>
              ${record.batch_ref ? `<div class="row"><label>Note</label><div>${record.batch_ref}</div></div>` : ''}
              <div class="row"><label>Timestamp</label><div>${formatDate(record.created_at)}</div></div>
              <div class="row"><label>Location</label><div>${record.latitude}, ${record.longitude}</div></div>
              <div class="row"><label>Event Hash</label><div>${record.mango_hash}</div></div>
              ${record.image_path ? `<img src="${API_BASE}${record.image_path}" alt="captured image">` : ''}
            </div>
          `;
        });

        const latest = data.chain[data.chain.length - 1];
        html += `<a class="btn" href="scanner.html?parent_hash=${encodeURIComponent(latest.mango_hash)}&lot_code=${encodeURIComponent(latest.lot_code)}">Add Next Event to This Lot</a>`;

        content.innerHTML = html;
      } catch (err) {
        content.innerHTML = '<p class="error">Could not reach verification service. Try again shortly.</p>';
        console.error(err);
      }
    }

    loadChain();
  </script>
</body>
</html>
